<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroke Risk Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            color: white;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
        }
        select, input {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 10px 14px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.3s;
        }
        select:focus, input:focus {
            border-color: #f093fb;
        }
        select option { background: #302b63; }
        .btn {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.85; }
        .result {
            margin-top: 24px;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 Stroke Risk Predictor</h1>
    <p class="subtitle">Enter patient details to predict stroke risk using AI</p>

    <form action="/predict" method="POST">
        <div class="grid">
            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" placeholder="e.g. 45" min="1" max="100" required>
            </div>
            <div class="form-group">
                <label>Hypertension</label>
                <select name="hypertension">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
            <div class="form-group">
                <label>Heart Disease</label>
                <select name="heart_disease">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ever Married</label>
                <select name="ever_married">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>
            <div class="form-group">
                <label>Work Type</label>
                <select name="work_type">
                    <option value="2">Private</option>
                    <option value="3">Self Employed</option>
                    <option value="0">Govt Job</option>
                    <option value="1">Children</option>
                </select>
            </div>
            <div class="form-group">
                <label>Residence Type</label>
                <select name="residence_type">
                    <option value="1">Urban</option>
                    <option value="0">Rural</option>
                </select>
            </div>
            <div class="form-group">
                <label>Smoking Status</label>
                <select name="smoking_status">
                    <option value="0">Never Smoked</option>
                    <option value="1">Formerly Smoked</option>
                    <option value="2">Smokes</option>
                    <option value="3">Unknown</option>
                </select>
            </div>
            <div class="form-group">
                <label>Avg Glucose Level</label>
                <input type="number" name="avg_glucose" placeholder="e.g. 85.5" step="0.1" required>
            </div>
            <div class="form-group">
                <label>BMI</label>
                <input type="number" name="bmi" placeholder="e.g. 24.5" step="0.1" required>
            </div>
        </div>

        <button type="submit" class="btn">🔍 Predict Stroke Risk</button>
    </form>

    {% if result %}
    <div class="result">{{ result }}</div>
    {% endif %}
</div>
</body>
</html>
